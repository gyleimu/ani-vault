<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风格C: 暗黑流光</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#09090b;color:rgba(255,255,255,.9);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.title-bar{display:flex;align-items:center;justify-content:flex-end;height:44px;padding:0 12px;background:rgba(15,15,20,.85);backdrop-filter:blur(30px);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.title-bar__controls{display:flex;align-items:center;gap:1px;padding:3px;background:rgba(255,255,255,.025);border-radius:20px;border:1px solid rgba(255,255,255,.04)}
.title-bar__btn{display:flex;align-items:center;justify-content:center;width:34px;height:26px;border:none;border-radius:17px;background:transparent;color:rgba(255,255,255,.35);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}
.title-bar__btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.title-bar__btn:active{transform:scale(.9)}
.title-bar__btn--close:hover{background:linear-gradient(135deg,rgba(239,68,68,.7),rgba(220,38,38,.8));color:#fff;box-shadow:0 2px 16px rgba(239,68,68,.2)}
.body{flex:1;display:flex;overflow:hidden}
.side-bar{display:flex;flex-direction:column;width:72px;height:100%;padding:20px 0;background:rgba(12,12,16,.7);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,.035);flex-shrink:0;align-items:center}
.side-bar__nav{display:flex;flex-direction:column;gap:4px;width:100%;padding:0 12px;flex:1}
.nav-item{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:48px;border:none;border-radius:14px;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.nav-item:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.65)}
.nav-item:active{transform:scale(.94)}
.nav-item.is-active{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));color:rgba(255,255,255,.92);box-shadow:0 4px 24px rgba(99,102,241,.08)}
.nav-item.is-active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,#818cf8,#a78bfa);box-shadow:0 0 14px rgba(129,140,248,.4)}
.nav-item.is-active::after{content:'';position:absolute;inset:0;border-radius:14px;border:1px solid rgba(99,102,241,.12);pointer-events:none}
.nav-item svg{width:22px;height:22px;flex-shrink:0}
.side-bar__divider{width:28px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:12px 0}
.side-bar__toggle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:none;border-radius:12px;background:transparent;color:rgba(255,255,255,.2);cursor:pointer;transition:all .2s ease}
.side-bar__toggle:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5)}
.content{flex:1;padding:32px;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,rgba(99,102,241,.03) 0%,transparent 50%),radial-gradient(ellipse at 70% 50%,rgba(139,92,246,.02) 0%,transparent 50%)}
.content__inner{text-align:center;max-width:500px}
.content__inner h2{font-size:14px;font-weight:500;color:rgba(255,255,255,.2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.content__inner p{font-size:13px;color:rgba(255,255,255,.12)}
.style-label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.1);letter-spacing:1px}
</style>
</head>
<body>
<header class="title-bar">
  <div class="title-bar__controls">
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="1" y1="5" x2="9" y2="5"/></svg></button>
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="8" height="8" rx="1.5"/></svg></button>
    <button class="title-bar__btn title-bar__btn--close"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg></button>
  </div>
</header>
<div class="body">
  <aside class="side-bar">
    <nav class="side-bar__nav">
      <button class="nav-item is-active"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5L10 2.5l7 6V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8.5z"/><path d="M7.5 18V11h5v7"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><polyline points="10,5.5 10,10 13.5,12"/></svg></button>
    </nav>
    <div class="side-bar__divider"></div>
    <button class="side-bar__toggle"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,4 6,8 10,12"/></svg></button>
  </aside>
  <main class="content">
    <div class="content__inner">
      <h2>风格C</h2>
      <p>暗黑流光 · 渐变光效 · 高端质感</p>
    </div>
  </main>
</div>
<div class="style-label">STYLE C — DARK GLOW</div>
</body>
</html>
