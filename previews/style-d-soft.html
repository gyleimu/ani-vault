<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风格D: 圆润柔光</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0c0c10;color:rgba(255,255,255,.9);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.title-bar{display:flex;align-items:center;justify-content:flex-end;height:48px;padding:0 14px;background:rgba(20,20,28,.7);backdrop-filter:blur(28px);border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.title-bar__controls{display:flex;align-items:center;gap:6px}
.title-bar__btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:none;border-radius:50%;background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1)}
.title-bar__btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);transform:scale(1.08)}
.title-bar__btn:active{transform:scale(.92);background:rgba(255,255,255,.06)}
.title-bar__btn--close{background:rgba(239,68,68,.08);color:rgba(239,68,68,.5)}
.title-bar__btn--close:hover{background:rgba(239,68,68,.25);color:rgba(255,100,100,.95);box-shadow:0 0 20px rgba(239,68,68,.15);transform:scale(1.08)}
.body{flex:1;display:flex;overflow:hidden}
.side-bar{display:flex;flex-direction:column;width:76px;height:100%;padding:20px 0;background:rgba(16,16,22,.6);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,.04);flex-shrink:0;align-items:center}
.side-bar__nav{display:flex;flex-direction:column;gap:8px;width:100%;padding:0 14px;flex:1}
.nav-item{position:relative;display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:1;max-height:48px;border:none;border-radius:16px;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1)}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);transform:translateY(-1px)}
.nav-item:active{transform:scale(.93) translateY(0)}
.nav-item.is-active{background:linear-gradient(145deg,rgba(168,85,247,.1),rgba(99,102,241,.12));color:rgba(255,255,255,.92);box-shadow:0 4px 20px rgba(168,85,247,.1),0 0 0 1px rgba(168,85,247,.1);transform:translateY(-1px)}
.nav-item.is-active:hover{box-shadow:0 6px 28px rgba(168,85,247,.15),0 0 0 1px rgba(168,85,247,.15)}
.nav-item svg{width:22px;height:22px;flex-shrink:0}
.side-bar__divider{width:32px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:12px 0}
.side-bar__toggle{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:none;border-radius:14px;background:transparent;color:rgba(255,255,255,.2);cursor:pointer;transition:all .2s ease}
.side-bar__toggle:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5)}
.content{flex:1;padding:32px;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 40% 40%,rgba(168,85,247,.02) 0%,transparent 50%),radial-gradient(ellipse at 60% 60%,rgba(99,102,241,.02) 0%,transparent 50%)}
.content__inner{text-align:center;max-width:500px}
.content__inner h2{font-size:14px;font-weight:500;color:rgba(255,255,255,.2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.content__inner p{font-size:13px;color:rgba(255,255,255,.12)}
.style-label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.1);letter-spacing:1px}
</style>
</head>
<body>
<header class="title-bar">
  <div class="title-bar__controls">
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="1" y1="5" x2="9" y2="5"/></svg></button>
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="8" height="8" rx="1.5"/></svg></button>
    <button class="title-bar__btn title-bar__btn--close"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg></button>
  </div>
</header>
<div class="body">
  <aside class="side-bar">
    <nav class="side-bar__nav">
      <button class="nav-item is-active"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5L10 2.5l7 6V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8.5z"/><path d="M7.5 18V11h5v7"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><polyline points="10,5.5 10,10 13.5,12"/></svg></button>
    </nav>
    <div class="side-bar__divider"></div>
    <button class="side-bar__toggle"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,4 6,8 10,12"/></svg></button>
  </aside>
  <main class="content">
    <div class="content__inner">
      <h2>风格D</h2>
      <p>圆润柔光 · 紫蓝渐变 · 活泼灵动</p>
    </div>
  </main>
</div>
<div class="style-label">STYLE D — SOFT GLOW</div>
</body>
</html>
