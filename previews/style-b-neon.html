<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风格B: 霓虹科技</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080810;color:rgba(255,255,255,.9);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.title-bar{display:flex;align-items:center;justify-content:flex-end;height:44px;padding:0 12px;background:linear-gradient(180deg,rgba(0,255,247,.03) 0%,rgba(8,8,16,.95) 100%);backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,255,247,.12);flex-shrink:0}
.title-bar__controls{display:flex;align-items:center;gap:3px;padding:4px 8px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid rgba(0,255,247,.08)}
.title-bar__btn{display:flex;align-items:center;justify-content:center;width:30px;height:26px;border:none;border-radius:6px;background:transparent;color:rgba(0,255,247,.45);cursor:pointer;transition:all .2s ease}
.title-bar__btn:hover{background:rgba(0,255,247,.1);color:rgba(0,255,247,.95);box-shadow:0 0 12px rgba(0,255,247,.15)}
.title-bar__btn:active{transform:scale(.88)}
.title-bar__btn--close:hover{background:rgba(255,50,80,.2);color:rgba(255,80,100,.95);box-shadow:0 0 16px rgba(255,50,80,.2);border-color:rgba(255,80,100,.15)}
.body{flex:1;display:flex;overflow:hidden}
.side-bar{display:flex;flex-direction:column;width:68px;height:100%;padding:16px 0;background:rgba(0,0,0,.4);backdrop-filter:blur(20px);border-right:1px solid rgba(0,255,247,.08);flex-shrink:0;align-items:center}
.side-bar__nav{display:flex;flex-direction:column;gap:6px;width:100%;padding:0 10px;flex:1}
.nav-item{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:44px;border:none;border-radius:10px;background:transparent;color:rgba(0,255,247,.3);cursor:pointer;transition:all .25s ease}
.nav-item:hover{background:rgba(0,255,247,.06);color:rgba(0,255,247,.75);box-shadow:0 0 20px rgba(0,255,247,.05)}
.nav-item:active{transform:scale(.92)}
.nav-item.is-active{background:rgba(0,255,247,.08);color:rgba(0,255,247,.95);box-shadow:inset 0 0 20px rgba(0,255,247,.04),0 0 24px rgba(0,255,247,.06)}
.nav-item.is-active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 2px 2px 0;background:linear-gradient(180deg,#00fff7,#a855f7);box-shadow:0 0 10px rgba(0,255,247,.5)}
.nav-item.is-active::after{content:'';position:absolute;inset:0;border-radius:10px;border:1px solid rgba(0,255,247,.15);pointer-events:none}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.side-bar__divider{width:24px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,247,.15),transparent);margin:8px 0}
.side-bar__toggle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:none;border-radius:8px;background:transparent;color:rgba(0,255,247,.25);cursor:pointer;transition:all .2s ease}
.side-bar__toggle:hover{background:rgba(0,255,247,.06);color:rgba(0,255,247,.6)}
.content{flex:1;padding:32px;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(0,255,247,.02) 0%,transparent 60%)}
.content__inner{text-align:center;max-width:500px}
.content__inner h2{font-size:14px;font-weight:500;color:rgba(0,255,247,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.content__inner p{font-size:13px;color:rgba(255,255,255,.15)}
.style-label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(0,255,247,.15);letter-spacing:1px}
</style>
</head>
<body>
<header class="title-bar">
  <div class="title-bar__controls">
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="1" y1="5" x2="9" y2="5"/></svg></button>
    <button class="title-bar__btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="8" height="8" rx="1.5"/></svg></button>
    <button class="title-bar__btn title-bar__btn--close"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5"/><line x1="8.5" y1="1.5" x2="1.5" y2="8.5"/></svg></button>
  </div>
</header>
<div class="body">
  <aside class="side-bar">
    <nav class="side-bar__nav">
      <button class="nav-item is-active"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5L10 2.5l7 6V17a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8.5z"/><path d="M7.5 18V11h5v7"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg></button>
      <button class="nav-item"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><polyline points="10,5.5 10,10 13.5,12"/></svg></button>
    </nav>
    <div class="side-bar__divider"></div>
    <button class="side-bar__toggle"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,4 6,8 10,12"/></svg></button>
  </aside>
  <main class="content">
    <div class="content__inner">
      <h2>风格B</h2>
      <p>霓虹科技 · 青色辉光 · 赛博朋克</p>
    </div>
  </main>
</div>
<div class="style-label">STYLE B — NEON CYBER</div>
</body>
</html>
